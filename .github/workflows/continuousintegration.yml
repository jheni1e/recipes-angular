name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: recipes-angular
        run: npm ci

      - name: Build
        working-directory: recipes-angular
        run: npm run build --if-present

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Test
        working-directory: recipes-angular
        run: |
          export CHROME_BIN=google-chrome
          npm test -- --watch=false --browsers=ChromeHeadless

  discord:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \"Novo ${{ github.event_name }}! \nRepo: ${{ github.repository }}\nAutor: ${{ github.actor }}\nBranch: ${{ github.ref_name }}\"}" \
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}